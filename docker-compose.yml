services:
  api:
    build: .
    container_name: market-analysis-agent
    ports:
      - "8000:8000"
    environment:
      # Set the LLM API key here OR pass it via shell environment.
      # Leave empty to run in fallback (deterministic) mode — no key required.
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - DEBUG=${DEBUG:-false}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
